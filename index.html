<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BUSSABA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; }
        .tab-active { border-bottom: 3px solid #4f46e5; color: #4f46e5; font-weight: 600; }
        /* Custom Color Palettes for Slots */
        .cp-1 { background-color: #fef2f2; color: #991b1b; border-color: #fecaca; }
        .cp-2 { background-color: #f0fdf4; color: #166534; border-color: #bbf7d0; }
        .cp-3 { background-color: #eff6ff; color: #1e40af; border-color: #bfdbfe; }
        .cp-4 { background-color: #fffaf1; color: #92400e; border-color: #fef3c7; }
        .cp-5 { background-color: #faf5ff; color: #6b21a8; border-color: #e9d5ff; }
        .cp-6 { background-color: #f5f3ff; color: #3730a3; border-color: #ddd6fe; }
        .cp-7 { background-color: #fdf2f8; color: #9d174d; border-color: #fbcfe8; }
        .cp-8 { background-color: #f0fdfa; color: #115e59; border-color: #99f6e4; }
        .cp-9 { background-color: #f8fafc; color: #334155; border-color: #e2e8f0; }
        .cp-0 { background-color: #ecfeff; color: #155e75; border-color: #a5f3fc; }

        /* Style สำหรับปุ่มลบรายตัว */
        .name-tag {
            display: inline-flex;
            align-items: center;
            background: white;
            border: 1px solid #e2e8f0;
            padding: 4px 12px;
            border-radius: 10px;
            margin: 4px;
            font-size: 0.875rem;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }
        .btn-remove {
            margin-left: 8px;
            color: #ef4444;
            font-weight: bold;
            cursor: pointer;
            font-size: 1.2rem;
            line-height: 1;
            transition: all 0.2s;
        }
        .btn-remove:hover { color: #b91c1c; transform: scale(1.2); }
    </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-800 antialiased">

    <div class="max-w-6xl mx-auto px-4 py-8 md:py-12">
        
        <div class="flex flex-col md:flex-row justify-between items-center gap-4 mb-8 pb-6 border-b border-slate-200">
            <h2 class="text-3xl font-black uppercase tracking-wider text-slate-800">🚀 BUSSABA</h2>
            
            <div class="flex flex-col sm:flex-row items-stretch sm:items-center gap-3 w-full md:w-auto">
                
                <div class="flex items-center border border-indigo-200 rounded-xl overflow-hidden bg-white shadow-sm">
                    <button onclick="loadNamesFromGoogle('A')" class="whitespace-nowrap text-xs bg-indigo-600 text-white px-3 py-2.5 hover:bg-indigo-700 active:scale-95 transition-all font-medium">📥 IMPORT G1</button>
                    <input type="number" id="import_limit_A" placeholder="ทั้งหมด" min="0" class="w-16 text-center text-xs font-bold outline-none text-indigo-600 px-1" title="ระบุจำนวนคนที่ต้องการดึง (ว่างไว้คือทั้งหมด)">
                </div>

                <div class="flex items-center border border-emerald-200 rounded-xl overflow-hidden bg-white shadow-sm">
                    <button onclick="loadNamesFromGoogle('B')" class="whitespace-nowrap text-xs bg-emerald-600 text-white px-3 py-2.5 hover:bg-emerald-700 active:scale-95 transition-all font-medium">📥 IMPORT G2</button>
                    <input type="number" id="import_limit_B" placeholder="ทั้งหมด" min="0" class="w-16 text-center text-xs font-bold outline-none text-emerald-600 px-1" title="ระบุจำนวนคนที่ต้องการดึง (ว่างไว้คือทั้งหมด)">
                </div>

                <button onclick="resetData()" class="text-sm bg-rose-50 text-rose-600 px-5 py-2.5 rounded-xl hover:bg-rose-100 active:scale-95 transition-all font-medium text-center shadow-sm">RESET ALL</button>
            </div>
        </div>

        <div class="bg-white p-6 md:p-8 rounded-3xl shadow-sm border border-slate-200/80 mb-8">
            <div class="mb-8">
                <h3 class="text-sm font-bold text-slate-400 mb-4 uppercase tracking-widest flex items-center">
                    <span class="w-1.5 h-4 bg-indigo-600 rounded-full mr-2"></span> คลังไอเทม (Total Stock)
                </h3>
                <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
                    <div class="p-4 rounded-2xl border bg-purple-50/20 border-purple-100 focus-within:border-purple-400 transition-all">
                        <label class="block text-xs font-bold text-purple-600 mb-1.5 uppercase tracking-wide">Fragment</label>
                        <input type="number" id="total_1" value="0" oninput="saveAndUpdate()" class="w-full bg-white text-slate-800 text-xl font-bold outline-none border-b-2 border-transparent focus:border-purple-500 pb-1">
                    </div>
                    <div class="p-4 rounded-2xl border bg-amber-50/20 border-amber-100 focus-within:border-amber-400 transition-all">
                        <label class="block text-xs font-bold text-amber-600 mb-1.5 uppercase tracking-wide">Light-Dark</label>
                        <input type="number" id="total_2" value="0" oninput="saveAndUpdate()" class="w-full bg-white text-slate-800 text-xl font-bold outline-none border-b-2 border-transparent focus:border-amber-500 pb-1">
                    </div>
                    <div class="p-4 rounded-2xl border bg-blue-50/20 border-blue-100 focus-within:border-blue-400 transition-all">
                        <label class="block text-xs font-bold text-blue-600 mb-1.5 uppercase tracking-wide">Time-Space</label>
                        <input type="number" id="total_3" value="0" oninput="saveAndUpdate()" class="w-full bg-white text-slate-800 text-xl font-bold outline-none border-b-2 border-transparent focus:border-blue-500 pb-1">
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                <div class="p-5 md:p-6 border border-slate-200 rounded-2xl bg-slate-50/50">
                    <div class="font-bold text-indigo-600 uppercase mb-4 border-b border-slate-200 pb-2">Group 1</div>
                    <div class="grid grid-cols-3 gap-3 mb-4 text-center">
                        <div>
                            <label class="block text-[11px] text-slate-500 mb-1">FRAG</label>
                            <input type="number" id="gA_p1" value="0" oninput="saveAndUpdate()" class="w-full p-2 border border-slate-200 rounded-xl text-center text-sm font-bold outline-none focus:border-indigo-500 transition-all">
                        </div>
                        <div>
                            <label class="block text-[11px] text-slate-500 mb-1">LD</label>
                            <input type="number" id="gA_p2" value="0" oninput="saveAndUpdate()" class="w-full p-2 border border-slate-200 rounded-xl text-center text-sm font-bold outline-none focus:border-indigo-500 transition-all">
                        </div>
                        <div>
                            <label class="block text-[11px] text-slate-500 mb-1">TS</label>
                            <input type="number" id="gA_p3" value="0" oninput="saveAndUpdate()" class="w-full p-2 border border-slate-200 rounded-xl text-center text-sm font-bold outline-none focus:border-indigo-500 transition-all">
                        </div>
                    </div>
                    <div id="gA_list" class="flex flex-wrap mb-3 bg-white/50 p-2 rounded-xl min-h-[40px]"></div>
                    <textarea id="gA_names" oninput="saveAndUpdate()" rows="3" class="w-full p-3 border border-slate-200 rounded-xl text-sm focus:border-indigo-500 outline-none transition-all" placeholder="ใส่รายชื่อ (หรือพิมพ์เพิ่มตรงนี้)"></textarea>
                </div>
                
                <div class="p-5 md:p-6 border border-slate-200 rounded-2xl bg-slate-50/50">
                    <div class="font-bold text-emerald-600 uppercase mb-4 border-b border-slate-200 pb-2">Group 2</div>
                    <div class="grid grid-cols-3 gap-3 mb-4 text-center">
                        <div>
                            <label class="block text-[11px] text-slate-500 mb-1">FRAG</label>
                            <input type="number" id="gB_p1" value="0" oninput="saveAndUpdate()" class="w-full p-2 border border-slate-200 rounded-xl text-center text-sm font-bold outline-none focus:border-emerald-500 transition-all">
                        </div>
                        <div>
                            <label class="block text-[11px] text-slate-500 mb-1">LD</label>
                            <input type="number" id="gB_p2" value="0" oninput="saveAndUpdate()" class="w-full p-2 border border-slate-200 rounded-xl text-center text-sm font-bold outline-none focus:border-emerald-500 transition-all">
                        </div>
                        <div>
                            <label class="block text-[11px] text-slate-500 mb-1">TS</label>
                            <input type="number" id="gB_p3" value="0" oninput="saveAndUpdate()" class="w-full p-2 border border-slate-200 rounded-xl text-center text-sm font-bold outline-none focus:border-emerald-500 transition-all">
                        </div>
                    </div>
                    <div id="gB_list" class="flex flex-wrap mb-3 bg-white/50 p-2 rounded-xl min-h-[40px]"></div>
                    <textarea id="gB_names" oninput="saveAndUpdate()" rows="3" class="w-full p-3 border border-slate-200 rounded-xl text-sm focus:border-emerald-500 outline-none transition-all" placeholder="ใส่รายชื่อ (หรือพิมพ์เพิ่มตรงนี้)"></textarea>
                </div>
            </div>
        </div>

        <div class="flex space-x-6 mb-6 border-b border-slate-200 text-sm pb-px overflow-x-auto">
            <button onclick="st(1)" id="t1" class="pb-3 px-2 transition-all tab-active whitespace-nowrap focus:outline-none">🧩 Puppet Fragment</button>
            <button onclick="st(2)" id="t2" class="pb-3 px-2 transition-all text-slate-400 hover:text-slate-600 whitespace-nowrap focus:outline-none">🪶 Feathers (L-D & T-S)</button>
        </div>

        <div id="res" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-5 mb-10"></div>

        <div class="bg-slate-900 p-6 md:p-8 rounded-3xl shadow-xl text-white mb-12">
            <h3 class="text-xl font-bold mb-6 flex items-center">
                <span class="w-2 h-6 bg-indigo-500 rounded-full mr-3"></span> 📍 สรุปตำแหน่งการแจกรายคน 
            </h3>
            <div id="loc-summary" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
        </div>
    </div>

    <script>
        let tab = 1;

        function getValue(id) { return parseInt(document.getElementById(id).value) || 0; }

        // --- ฟังก์ชันสำหรับลบรายชื่อรายตัว ---
        function removeSingleName(group, nameToRemove) {
            const id = group === 'A' ? 'gA_names' : 'gB_names';
            const textarea = document.getElementById(id);
            const names = textarea.value.split('\n')
                .map(n => n.trim())
                .filter(n => n !== '' && n !== nameToRemove);
            textarea.value = names.join('\n');
            saveAndUpdate();
        }

        // --- ฟังก์ชันวาด UI รายชื่อพร้อมปุ่ม x ---
        function renderNameListUI(groupId, namesText) {
            const container = document.getElementById(groupId === 'A' ? 'gA_list' : 'gB_list');
            const names = namesText.split('\n').map(n => n.trim()).filter(n => n !== '');
            if(names.length === 0) { container.innerHTML = ''; return; }
            container.innerHTML = names.map(name => `
                <span class="name-tag">
                    ${name}
                    <span class="btn-remove" onclick="removeSingleName('${groupId}', '${name}')">&times;</span>
                </span>
            `).join('');
        }

        function saveAndUpdate() {
            const namesA = document.getElementById('gA_names').value;
            const namesB = document.getElementById('gB_names').value;
            const limitA = document.getElementById('import_limit_A').value;
            const limitB = document.getElementById('import_limit_B').value;
            
            renderNameListUI('A', namesA);
            renderNameListUI('B', namesB);

            const data = {
                t1: getValue('total_1'), t2: getValue('total_2'), t3: getValue('total_3'),
                ga1: getValue('gA_p1'), ga2: getValue('gA_p2'), ga3: getValue('gA_p3'),
                gb1: getValue('gB_p1'), gb2: getValue('gB_p2'), gb3: getValue('gB_p3'),
                namesA: namesA, namesB: namesB,
                limitA: limitA, limitB: limitB
            };
            localStorage.setItem('bussaba_storage_v4', JSON.stringify(data));
            update();
        }

        function loadData() {
            const saved = localStorage.getItem('bussaba_storage_v4');
            if (saved) {
                const d = JSON.parse(saved);
                ['total_1','total_2','total_3','gA_p1','gA_p2','gA_p3','gB_p1','gB_p2','gB_p3'].forEach(id => {
                    const key = id.replace('total_','t').replace('gA_p','ga').replace('gB_p','gb');
                    document.getElementById(id).value = d[key] || 0;
                });
                document.getElementById('gA_names').value = d.namesA || "";
                document.getElementById('gB_names').value = d.namesB || "";
                document.getElementById('import_limit_A').value = d.limitA || "";
                document.getElementById('import_limit_B').value = d.limitB || "";
            }
            saveAndUpdate();
        }

        function resetData() { 
            if(confirm('คุณต้องการล้างข้อมูลทั้งหมดใช่หรือไม่?')) { 
                localStorage.removeItem('bussaba_storage_v4'); 
                location.reload(); 
            } 
        }

        function st(n) { tab = n; update(); }

        function update() {
            document.getElementById('t1').className = tab === 1 ? 'pb-3 px-2 transition-all tab-active whitespace-nowrap' : 'pb-3 px-2 transition-all text-slate-400 hover:text-slate-600 whitespace-nowrap';
            document.getElementById('t2').className = tab === 2 ? 'pb-3 px-2 transition-all tab-active whitespace-nowrap' : 'pb-3 px-2 transition-all text-slate-400 hover:text-slate-600 whitespace-nowrap';

            const container = document.getElementById('res');
            const locContainer = document.getElementById('loc-summary');
            container.innerHTML = '';
            locContainer.innerHTML = '';

            const t = [getValue('total_1'), getValue('total_2'), getValue('total_3')];
            const rawA = document.getElementById('gA_names').value.split('\n').map(n => n.trim()).filter(n => n !== '');
            const rawB = document.getElementById('gB_names').value.split('\n').map(n => n.trim()).filter(n => n !== '');
            
            const namesA = [...new Set(rawA)];
            const namesB = [...new Set(rawB)];
            const totalPeople = namesA.length + namesB.length;

            const groupInfo = `
                <div class="col-span-full grid grid-cols-1 sm:grid-cols-3 gap-4 mb-2">
                    <div class="bg-indigo-50 border border-indigo-100 rounded-2xl p-4">
                        <div class="text-xs text-indigo-500 font-bold uppercase mb-1">Group 1 Members</div>
                        <div class="text-3xl font-black text-indigo-700">${namesA.length} <span class="text-sm font-normal">คน</span></div>
                    </div>
                    <div class="bg-emerald-50 border border-emerald-100 rounded-2xl p-4">
                        <div class="text-xs text-emerald-500 font-bold uppercase mb-1">Group 2 Members</div>
                        <div class="text-3xl font-black text-emerald-700">${namesB.length} <span class="text-sm font-normal">คน</span></div>
                    </div>
                    <div class="bg-slate-100 border border-slate-200 rounded-2xl p-4">
                        <div class="text-xs text-slate-500 font-bold uppercase mb-1">Total Members</div>
                        <div class="text-3xl font-black text-slate-700">${totalPeople} <span class="text-sm font-normal">คน</span></div>
                    </div>
                </div>
            `;
            container.innerHTML = groupInfo;

            const gA = { p: [getValue('gA_p1'), getValue('gA_p2'), getValue('gA_p3')] };
            const gB = { p: [getValue('gB_p1'), getValue('gB_p2'), getValue('gB_p3')] };

            let allItems = [];
            let personTracker = {};

            const logPos = (name, type, globalIdx) => {
                if(!personTracker[name]) personTracker[name] = {};
                if(!personTracker[name][type]) personTracker[name][type] = { start: globalIdx, end: globalIdx };
                personTracker[name][type].end = globalIdx;
            };

            if (tab === 1) {
                let cur = 1;
                namesA.forEach((name, i) => {
                    for(let q=0; q < gA.p[0]; q++) if(cur <= t[0]) { logPos(name, 'FRAG', allItems.length+1); allItems.push({ n: 'Fragment', id: cur++, o: name, c: `cp-${(i+1)%10}` }); }
                });
                namesB.forEach((name, i) => {
                    for(let q=0; q < gB.p[0]; q++) if(cur <= t[0]) { logPos(name, 'FRAG', allItems.length+1); allItems.push({ n: 'Fragment', id: cur++, o: name, c: `cp-${(i+6)%10}` }); }
                });
                while(cur <= t[0]) allItems.push({ n: 'Fragment', id: cur++, o: 'เหลือแจก', c: 'bg-white text-slate-300 border-dashed border-slate-300' });
            } else {
                let curLD = 1, curTS = 1;
                namesA.forEach((name, i) => { for(let q=0; q < gA.p[1]; q++) if(curLD <= t[1]) { logPos(name, 'LD', allItems.length+1); allItems.push({ n: 'LD', id: curLD++, o: name, c: `cp-${(i+1)%10}` }); } });
                namesB.forEach((name, i) => { for(let q=0; q < gB.p[1]; q++) if(curLD <= t[1]) { logPos(name, 'LD', allItems.length+1); allItems.push({ n: 'LD', id: curLD++, o: name, c: `cp-${(i+6)%10}` }); } });
                while(curLD <= t[1]) allItems.push({ n: 'LD', id: curLD++, o: 'เหลือแจก', c: 'bg-white text-slate-300 border-dashed border-slate-300' });
                
                namesA.forEach((name, i) => { for(let q=0; q < gA.p[2]; q++) if(curTS <= t[2]) { logPos(name, 'TS', allItems.length+1); allItems.push({ n: 'TS', id: curTS++, o: name, c: `cp-${(i+1)%10}` }); } });
                namesB.forEach((name, i) => { for(let q=0; q < gB.p[2]; q++) if(curTS <= t[2]) { logPos(name, 'TS', allItems.length+1); allItems.push({ n: 'TS', id: curTS++, o: name, c: `cp-${(i+6)%10}` }); } });
                while(curTS <= t[2]) allItems.push({ n: 'TS', id: curTS++, o: 'เหลือแจก', c: 'bg-white text-slate-300 border-dashed border-slate-300' });
            }

            Object.keys(personTracker).forEach(name => {
                let detailsHTML = '';
                Object.keys(personTracker[name]).forEach(type => {
                    const pos = personTracker[name][type];
                    const sP = Math.ceil(pos.start/4), eP = Math.ceil(pos.end/4);
                    const sS = (pos.start%4===0)?4:pos.start%4, eS = (pos.end%4===0)?4:pos.end%4;
                    detailsHTML += `<div class="mt-2 bg-slate-800 p-3 rounded-xl border border-slate-700/60"><div class="flex justify-between items-center mb-1.5"><span class="text-indigo-400 font-bold text-xs">${type}</span><span class="text-[10px] text-slate-400 font-mono">#${pos.start}-${pos.end}</span></div><div class="text-sm text-slate-300">หน้า <b class="text-white">${sP}</b> ช่อง <b class="text-white">${sS}</b> → หน้า <b class="text-white">${eP}</b> ช่อง <b class="text-white">${eS}</b></div></div>`;
                });
                locContainer.innerHTML += `<div class="bg-slate-800/40 border border-slate-800 p-4 rounded-2xl"><div class="text-base font-bold text-indigo-200 border-b border-slate-800 pb-2 mb-2">👤 ${name}</div>${detailsHTML}</div>`;
            });

            for (let i = 0; i < allItems.length; i += 4) {
                const chunk = allItems.slice(i, i + 4);
                let html = `<div class="bg-white border border-slate-200 rounded-2xl overflow-hidden shadow-sm flex flex-col h-full hover:shadow-md transition-all"><div class="bg-slate-800 text-white p-4 flex justify-between items-center"><span class="text-lg font-bold">PAGE ${Math.floor(i/4)+1}</span><span class="text-indigo-300 text-[11px] font-mono">#${i+1}</span></div><div class="p-3 space-y-2.5 flex-grow bg-slate-50/30">`;
                chunk.forEach((item, idx) => {
                    html += `<div class="p-3 border rounded-xl ${item.c} flex flex-col min-h-[68px] relative transition-all"><span class="absolute top-1.5 right-2 text-[8px] font-bold opacity-40">SLOT ${idx+1}</span><div class="text-[10px] font-bold opacity-60 uppercase mb-0.5">${item.n} #${item.id}</div><div class="text-sm font-bold truncate">${item.o}</div></div>`;
                });
                container.innerHTML += html + `</div></div>`;
            }
        }

        async function loadNamesFromGoogle(targetGroup){
            try {
                const sheetId = '1BsmxOXc1c7lgrcR59mIZM8sXQoM-YZrTACRRJ5-jw0w', gid = '588302956';
                const url = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?gid=${gid}&tqx=out:json`;
                const res = await fetch(url);
                const text = await res.text();
                const json = JSON.parse(text.substring(47).slice(0,-2));
                const rows = json.table.rows;
                
                let incomingNames = [];
                rows.forEach(row => { 
                    if(row.c && row.c[0] && row.c[0].v){ 
                        const v = String(row.c[0].v).trim(); 
                        if(v.toLowerCase() !== 'name' && v !== '') incomingNames.push(v); 
                    } 
                });

                // ตรวจสอบลิมิตของกลุ่มที่เลือกดึงข้อมูล
                const limitInput = document.getElementById(targetGroup === 'A' ? 'import_limit_A' : 'import_limit_B').value;
                const limit = parseInt(limitInput) || 0;

                if (targetGroup === 'A') {
                    // หากใส่จำนวนลิมิต ให้ตัดข้อมูลตามที่ระบุ
                    if(limit > 0) incomingNames = incomingNames.slice(0, limit);
                    document.getElementById('gA_names').value = incomingNames.join('\n');
                } else {
                    const g1 = document.getElementById('gA_names').value.split('\n').map(n => n.trim());
                    // กรองรายชื่อที่ซ้ำกับ Group 1 ออกก่อน
                    let filtered = incomingNames.filter(name => !g1.includes(name));
                    // หากใส่จำนวนลิมิต ให้ตัดข้อมูลหลังจากกรองแล้ว
                    if(limit > 0) filtered = filtered.slice(0, limit);
                    document.getElementById('gB_names').value = filtered.join('\n');
                }
                saveAndUpdate();
            } catch(err) { alert('โหลดข้อมูลไม่สำเร็จ'); }
        }

        window.onload = loadData;
    </script>
</body>
</html>
