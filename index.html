<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BUSSABA ITEM CALCULATOR - LOCATION TRACKING</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; }
        .tab-active { border-bottom: 3px solid #6366f1; color: #6366f1; font-weight: 600; }
        .cp-1 { background-color: #fef2f2; color: #991b1b; border-color: #fecaca; }
        .cp-2 { background-color: #f0fdf4; color: #166534; border-color: #bbf7d0; }
        .cp-3 { background-color: #eff6ff; color: #1e40af; border-color: #bfdbfe; }
        .cp-4 { background-color: #fffaf1; color: #92400e; border-color: #fef3c7; }
        .cp-5 { background-color: #faf5ff; color: #6b21a8; border-color: #e9d5ff; }
        .cp-6 { background-color: #f5f3ff; color: #3730a3; border-color: #ddd6fe; }
        .cp-7 { background-color: #fdf2f8; color: #9d174d; border-color: #fbcfe8; }
        .cp-8 { background-color: #f0fdfa; color: #115e59; border-color: #99f6e4; }
        .cp-9 { background-color: #f8fafc; color: #334155; border-color: #e2e8f0; }
        .cp-0 { background-color: #ecfeff; color: #155e75; border-color: #a5f3fc; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen p-4 md:p-8 text-slate-800">

    <div class="max-w-6xl mx-auto">
        <div class="flex justify-between items-center mb-8">
            <h2 class="text-2xl font-bold uppercase tracking-widest text-slate-700">BUSSABA CALCULATOR V3</h2>
            <button onclick="resetData()" class="text-xs bg-red-50 text-red-500 px-4 py-2 rounded-xl hover:bg-red-100 transition-all font-bold">RESET ALL</button>
        </div>

        <!-- Input Section -->
        <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-200 mb-6">
            <div class="mb-8 text-center md:text-left">
                <h3 class="text-sm font-bold text-slate-400 mb-4 uppercase tracking-widest flex items-center">
                    <span class="w-1.5 h-4 bg-indigo-500 rounded-full mr-2"></span> คลังไอเทม (Total Stock)
                </h3>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div class="p-4 rounded-2xl border bg-purple-50/30 border-purple-100 text-center">
                        <label class="block text-[10px] font-bold text-purple-600 mb-2 uppercase">Fragment</label>
                        <input type="number" id="total_1" value="0" oninput="saveAndUpdate()" class="w-full bg-white border border-purple-200 rounded-xl p-2 text-center text-xl font-bold outline-none focus:ring-2 focus:ring-purple-400">
                    </div>
                    <div class="p-4 rounded-2xl border bg-amber-50/30 border-amber-100 text-center">
                        <label class="block text-[10px] font-bold text-amber-600 mb-2 uppercase">Light-Dark</label>
                        <input type="number" id="total_2" value="0" oninput="saveAndUpdate()" class="w-full bg-white border border-amber-200 rounded-xl p-2 text-center text-xl font-bold outline-none focus:ring-2 focus:ring-amber-400">
                    </div>
                    <div class="p-4 rounded-2xl border bg-blue-50/30 border-blue-100 text-center">
                        <label class="block text-[10px] font-bold text-blue-600 mb-2 uppercase">Time-Space</label>
                        <input type="number" id="total_3" value="0" oninput="saveAndUpdate()" class="w-full bg-white border border-blue-200 rounded-xl p-2 text-center text-xl font-bold outline-none focus:ring-2 focus:ring-blue-400">
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                <!-- Group 1 -->
                <div class="p-5 border-2 border-indigo-50 rounded-3xl bg-indigo-50/10">
                    <div class="font-bold text-indigo-700 uppercase mb-4 border-b border-indigo-100 pb-2">Group 1 (First Class)</div>
                    <div class="grid grid-cols-3 gap-3 mb-4 text-center">
                        <div><label class="block text-[9px] text-indigo-400 font-bold mb-1">FRAG/คน</label><input type="number" id="gA_p1" value="0" oninput="saveAndUpdate()" class="w-full p-2 border border-indigo-100 rounded-xl text-center text-sm font-bold outline-none"></div>
                        <div><label class="block text-[9px] text-indigo-400 font-bold mb-1">LD/คน</label><input type="number" id="gA_p2" value="0" oninput="saveAndUpdate()" class="w-full p-2 border border-indigo-100 rounded-xl text-center text-sm font-bold outline-none"></div>
                        <div><label class="block text-[9px] text-indigo-400 font-bold mb-1">TS/คน</label><input type="number" id="gA_p3" value="0" oninput="saveAndUpdate()" class="w-full p-2 border border-indigo-100 rounded-xl text-center text-sm font-bold outline-none"></div>
                    </div>
                    <textarea id="gA_names" oninput="saveAndUpdate()" rows="4" class="w-full p-3 border border-indigo-100 rounded-xl text-sm focus:ring-2 focus:ring-indigo-300 outline-none" placeholder="รายชื่อกลุ่ม 1"></textarea>
                </div>
                <!-- Group 2 -->
                <div class="p-5 border-2 border-emerald-50 rounded-3xl bg-emerald-50/10">
                    <div class="font-bold text-emerald-700 uppercase mb-4 border-b border-emerald-100 pb-2">Group 2 (Second Class)</div>
                    <div class="grid grid-cols-3 gap-3 mb-4 text-center">
                        <div><label class="block text-[9px] text-emerald-400 font-bold mb-1">FRAG/คน</label><input type="number" id="gB_p1" value="0" oninput="saveAndUpdate()" class="w-full p-2 border border-emerald-100 rounded-xl text-center text-sm font-bold outline-none"></div>
                        <div><label class="block text-[9px] text-emerald-400 font-bold mb-1">LD/คน</label><input type="number" id="gB_p2" value="0" oninput="saveAndUpdate()" class="w-full p-2 border border-emerald-100 rounded-xl text-center text-sm font-bold outline-none"></div>
                        <div><label class="block text-[9px] text-emerald-400 font-bold mb-1">TS/คน</label><input type="number" id="gB_p3" value="0" oninput="saveAndUpdate()" class="w-full p-2 border border-emerald-100 rounded-xl text-center text-sm font-bold outline-none"></div>
                    </div>
                    <textarea id="gB_names" oninput="saveAndUpdate()" rows="4" class="w-full p-3 border border-emerald-100 rounded-xl text-sm focus:ring-2 focus:ring-emerald-300 outline-none" placeholder="รายชื่อกลุ่ม 2"></textarea>
                </div>
            </div>
        </div>

        <!-- Tab selection -->
        <div class="flex space-x-8 mb-6 border-b border-slate-200 text-sm pb-1 overflow-x-auto">
            <button onclick="st(1)" id="t1" class="pb-2 px-4 transition-all tab-active whitespace-nowrap">Puppet Fragment</button>
            <button onclick="st(2)" id="t2" class="pb-2 px-4 transition-all text-slate-400 whitespace-nowrap">Feathers (L-D & T-S)</button>
        </div>

        <!-- Result Grid -->
        <div id="res" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 mb-8"></div>

        <!-- SUMMARY SECTION (LOCATION TRACKING) -->
        <div class="bg-slate-900 p-6 rounded-3xl shadow-xl text-white mb-20">
            <h3 class="text-xl font-bold mb-6 flex items-center">
                <span class="w-2 h-6 bg-indigo-400 rounded-full mr-3"></span> 
                สรุปตำแหน่งการแจกรายคน (Where to find)
            </h3>
            <div id="loc-summary" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
        </div>
    </div>

    <script>
        let tab = 1;

        function getValue(id) { return parseInt(document.getElementById(id).value) || 0; }

        function saveAndUpdate() {
            const data = {
                t1: getValue('total_1'), t2: getValue('total_2'), t3: getValue('total_3'),
                ga1: getValue('gA_p1'), ga2: getValue('gA_p2'), ga3: getValue('gA_p3'),
                gb1: getValue('gB_p1'), gb2: getValue('gB_p2'), gb3: getValue('gB_p3'),
                namesA: document.getElementById('gA_names').value,
                namesB: document.getElementById('gB_names').value
            };
            localStorage.setItem('bussaba_storage_v3', JSON.stringify(data));
            update();
        }

        function loadData() {
            const saved = localStorage.getItem('bussaba_storage_v3');
            if (saved) {
                const d = JSON.parse(saved);
                ['total_1','total_2','total_3','gA_p1','gA_p2','gA_p3','gB_p1','gB_p2','gB_p3'].forEach(id => {
                    document.getElementById(id).value = d[id.replace('total_','t').replace('gA_p','ga').replace('gB_p','gb')] || 0;
                });
                document.getElementById('gA_names').value = d.namesA || "";
                document.getElementById('gB_names').value = d.namesB || "";
            }
            update();
        }

        function resetData() { if(confirm('ล้างข้อมูล?')) { localStorage.removeItem('bussaba_storage_v3'); location.reload(); } }

        function st(n) { tab = n; update(); }

        function update() {
            document.getElementById('t1').className = tab === 1 ? 'pb-2 px-4 transition-all tab-active whitespace-nowrap' : 'pb-2 px-4 transition-all text-slate-400 whitespace-nowrap';
            document.getElementById('t2').className = tab === 2 ? 'pb-2 px-4 transition-all tab-active whitespace-nowrap' : 'pb-2 px-4 transition-all text-slate-400 whitespace-nowrap';

            const container = document.getElementById('res');
            const locContainer = document.getElementById('loc-summary');
            container.innerHTML = ''; locContainer.innerHTML = '';

            const t = [getValue('total_1'), getValue('total_2'), getValue('total_3')];
            const namesA = document.getElementById('gA_names').value.split('\n').map(n => n.trim()).filter(n => n !== "");
            const namesB = document.getElementById('gB_names').value.split('\n').map(n => n.trim()).filter(n => n !== "");
            const gA = { p: [getValue('gA_p1'), getValue('gA_p2'), getValue('gA_p3')] };
            const gB = { p: [getValue('gB_p1'), getValue('gB_p2'), getValue('gB_p3')] };
            
            let allItems = [];
            let personTracker = {}; // { "Name": { "LD": { startIdx, endIdx }, "TS": { startIdx, endIdx } } }

            const logPos = (name, type, globalIdx) => {
                if(!personTracker[name]) personTracker[name] = {};
                if(!personTracker[name][type]) personTracker[name][type] = { start: globalIdx, end: globalIdx };
                personTracker[name][type].end = globalIdx;
            };

            if (tab === 1) {
                let cur = 1;
                namesA.forEach((name, i) => {
                    for(let q=0; q < gA.p[0]; q++) if(cur <= t[0]) { logPos(name, 'FRAG', allItems.length + 1); allItems.push({ n: 'Fragment', id: cur++, o: name, c: `cp-${(i+1)%10}` }); }
                });
                namesB.forEach((name, i) => {
                    for(let q=0; q < gB.p[0]; q++) if(cur <= t[0]) { logPos(name, 'FRAG', allItems.length + 1); allItems.push({ n: 'Fragment', id: cur++, o: name, c: `cp-${(i+6)%10}` }); }
                });
                while(cur <= t[0]) allItems.push({ n: 'Fragment', id: cur++, o: "เหลือ", c: "bg-white text-slate-300 border-dashed" });
            } else {
                let curLD = 1, curTS = 1;
                // LD Loop
                namesA.forEach((name, i) => { for(let q=0; q < gA.p[1]; q++) if(curLD <= t[1]) { logPos(name, 'LD', allItems.length + 1); allItems.push({ n: 'LD', id: curLD++, o: name, c: `cp-${(i+1)%10}` }); } });
                namesB.forEach((name, i) => { for(let q=0; q < gB.p[1]; q++) if(curLD <= t[1]) { logPos(name, 'LD', allItems.length + 1); allItems.push({ n: 'LD', id: curLD++, o: name, c: `cp-${(i+6)%10}` }); } });
                while(curLD <= t[1]) allItems.push({ n: 'LD', id: curLD++, o: "เหลือ", c: "bg-white text-slate-300 border-dashed" });
                // TS Loop
                namesA.forEach((name, i) => { for(let q=0; q < gA.p[2]; q++) if(curTS <= t[2]) { logPos(name, 'TS', allItems.length + 1); allItems.push({ n: 'TS', id: curTS++, o: name, c: `cp-${(i+1)%10}` }); } });
                namesB.forEach((name, i) => { for(let q=0; q < gB.p[2]; q++) if(curTS <= t[2]) { logPos(name, 'TS', allItems.length + 1); allItems.push({ n: 'TS', id: curTS++, o: name, c: `cp-${(i+6)%10}` }); } });
                while(curTS <= t[2]) allItems.push({ n: 'TS', id: curTS++, o: "เหลือ", c: "bg-white text-slate-300 border-dashed" });
            }

            // Build Individual Summary with Location
            Object.keys(personTracker).forEach(name => {
                let detailsHTML = '';
                Object.keys(personTracker[name]).forEach(type => {
                    const pos = personTracker[name][type];
                    const startPage = Math.ceil(pos.start / 4);
                    const endPage = Math.ceil(pos.end / 4);
                    const startSlot = (pos.start % 4 === 0) ? 4 : pos.start % 4;
                    const endSlot = (pos.end % 4 === 0) ? 4 : pos.end % 4;

                    detailsHTML += `
                    <div class="mt-2 bg-slate-800 p-3 rounded-xl border border-slate-700">
                        <div class="flex justify-between items-center mb-1">
                            <span class="text-indigo-400 font-bold text-xs">${type}</span>
                            <span class="text-[10px] text-slate-400">ลำดับ #${pos.start} - #${pos.end}</span>
                        </div>
                        <div class="text-sm">
                            หน้า <span class="text-white font-bold">${startPage}</span> ช่อง <span class="text-white font-bold">${startSlot}</span> 
                            ถึง หน้า <span class="text-white font-bold">${endPage}</span> ช่อง <span class="text-white font-bold">${endSlot}</span>
                        </div>
                    </div>`;
                });

                locContainer.innerHTML += `
                <div class="bg-slate-800/50 border border-slate-700 p-4 rounded-2xl">
                    <div class="text-lg font-bold text-indigo-300 border-b border-slate-700 pb-2">${name}</div>
                    ${detailsHTML}
                </div>`;
            });

            // Build Cards
            for (let i = 0; i < allItems.length; i += 4) {
                const chunk = allItems.slice(i, i + 4);
                let html = `<div class="bg-white border-2 border-slate-200 rounded-2xl overflow-hidden shadow-sm flex flex-col h-full">
                    <div class="bg-slate-800 text-white p-4 flex justify-between items-center">
                        <span class="text-xl font-black">PAGE ${Math.floor(i/4)+1}</span>
                        <span class="bg-slate-900 text-indigo-300 px-2 py-1 rounded text-[10px]">#${i+1}</span>
                    </div>
                    <div class="p-3 space-y-2 flex-grow">`;
                chunk.forEach((item, idx) => {
                    html += `<div class="p-2 border rounded-xl ${item.c} flex flex-col min-h-[60px] shadow-sm relative">
                        <span class="absolute top-1 right-2 text-[8px] font-bold opacity-30">SLOT ${idx+1}</span>
                        <div class="text-[9px] font-bold opacity-60">${item.n} #${item.id}</div>
                        <div class="text-[13px] font-bold truncate">${item.o}</div>
                    </div>`;
                });
                for(let j=0; j < 4-chunk.length; j++) html += `<div class="h-[60px] border border-dashed border-slate-50 rounded-xl"></div>`;
                container.innerHTML += html + `</div></div>`;
            }
        }
        window.onload = loadData;
    </script>
</body>
</html>
