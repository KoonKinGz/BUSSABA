<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Item Distribution System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; }
        .tab-active { border-bottom: 3px solid #6366f1; color: #6366f1; font-weight: 600; }
        /* ชุดสีคละสำหรับคนรับ */
        .cp-1 { background-color: #fef2f2; color: #991b1b; border-color: #fecaca; }
        .cp-2 { background-color: #f0fdf4; color: #166534; border-color: #bbf7d0; }
        .cp-3 { background-color: #eff6ff; color: #1e40af; border-color: #bfdbfe; }
        .cp-4 { background-color: #fffaf1; color: #92400e; border-color: #fef3c7; }
        .cp-5 { background-color: #faf5ff; color: #6b21a8; border-color: #e9d5ff; }
        .cp-6 { background-color: #f5f3ff; color: #3730a3; border-color: #ddd6fe; }
        .cp-7 { background-color: #fdf2f8; color: #9d174d; border-color: #fbcfe8; }
        .cp-8 { background-color: #f0fdfa; color: #115e59; border-color: #99f6e4; }
        .cp-9 { background-color: #f8fafc; color: #334155; border-color: #e2e8f0; }
        .cp-0 { background-color: #ecfeff; color: #155e75; border-color: #a5f3fc; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen p-4 md:p-8">

    <div class="max-w-6xl mx-auto">
        <h2 class="text-2xl font-bold text-center mb-8 text-slate-800 uppercase tracking-wide">ระบบจัดการลำดับไอเทม</h2>

        <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-200 mb-6">
            
            <div class="mb-8">
                <h3 class="text-sm font-bold text-slate-400 mb-4 uppercase tracking-widest flex items-center">
                    <span class="w-1.5 h-4 bg-indigo-500 rounded-full mr-2"></span> จำนวนของที่มีทั้งหมด
                </h3>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div class="p-4 rounded-2xl border bg-purple-50/30 border-purple-100 text-center">
                        <label class="block text-xs font-bold text-purple-600 mb-2 uppercase">Fragment</label>
                        <input type="number" id="total_1" value="0" class="w-full bg-white border border-purple-200 rounded-xl p-2 text-center text-xl font-bold outline-none focus:ring-2 focus:ring-purple-400">
                    </div>
                    <div class="p-4 rounded-2xl border bg-amber-50/30 border-amber-100 text-center">
                        <label class="block text-xs font-bold text-amber-600 mb-2 uppercase">Light-Dark</label>
                        <input type="number" id="total_2" value="0" class="w-full bg-white border border-amber-200 rounded-xl p-2 text-center text-xl font-bold outline-none focus:ring-2 focus:ring-amber-400">
                    </div>
                    <div class="p-4 rounded-2xl border bg-blue-50/30 border-blue-100 text-center">
                        <label class="block text-xs font-bold text-blue-600 mb-2 uppercase">Time-Space</label>
                        <input type="number" id="total_3" value="0" class="w-full bg-white border border-blue-200 rounded-xl p-2 text-center text-xl font-bold outline-none focus:ring-2 focus:ring-blue-400">
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-8">
                <div class="p-5 border-2 border-indigo-50 rounded-3xl bg-indigo-50/10">
                    <div class="flex justify-between items-center mb-5 border-b border-indigo-100 pb-3">
                        <span class="font-bold text-indigo-700">GROUP 1 (First Class)</span>
                        <div class="flex items-center">
                            <span class="text-[11px] font-bold text-slate-400 mr-2 uppercase">จำนวนคน:</span>
                            <input type="number" id="gA_people" value="0" class="w-14 p-1.5 border border-indigo-200 rounded-xl text-center font-bold text-indigo-700 outline-none">
                        </div>
                    </div>
                    <div class="grid grid-cols-3 gap-3">
                        <div class="text-center">
                            <label class="block text-[10px] text-indigo-400 font-bold mb-1 uppercase">Fragment / คน</label>
                            <input type="number" id="gA_p1" value="0" class="w-full p-2 border border-indigo-100 rounded-xl text-center text-sm font-bold bg-white">
                        </div>
                        <div class="text-center">
                            <label class="block text-[10px] text-indigo-400 font-bold mb-1 uppercase">Light-Dark / คน</label>
                            <input type="number" id="gA_p2" value="0" class="w-full p-2 border border-indigo-100 rounded-xl text-center text-sm font-bold bg-white">
                        </div>
                        <div class="text-center">
                            <label class="block text-[10px] text-indigo-400 font-bold mb-1 uppercase">Time-Space / คน</label>
                            <input type="number" id="gA_p3" value="0" class="w-full p-2 border border-indigo-100 rounded-xl text-center text-sm font-bold bg-white">
                        </div>
                    </div>
                </div>

                <div class="p-5 border-2 border-emerald-50 rounded-3xl bg-emerald-50/10">
                    <div class="flex justify-between items-center mb-5 border-b border-emerald-100 pb-3">
                        <span class="font-bold text-emerald-700">GROUP 2 (Second Class)</span>
                        <div class="flex items-center">
                            <span class="text-[11px] font-bold text-slate-400 mr-2 uppercase">จำนวนคน:</span>
                            <input type="number" id="gB_people" value="0" class="w-14 p-1.5 border border-emerald-200 rounded-xl text-center font-bold text-emerald-700 outline-none">
                        </div>
                    </div>
                    <div class="grid grid-cols-3 gap-3">
                        <div class="text-center">
                            <label class="block text-[10px] text-emerald-400 font-bold mb-1 uppercase">Fragment / คน</label>
                            <input type="number" id="gB_p1" value="0" class="w-full p-2 border border-emerald-100 rounded-xl text-center text-sm font-bold bg-white">
                        </div>
                        <div class="text-center">
                            <label class="block text-[10px] text-emerald-400 font-bold mb-1 uppercase">Light-Dark / คน</label>
                            <input type="number" id="gB_p2" value="0" class="w-full p-2 border border-emerald-100 rounded-xl text-center text-sm font-bold bg-white">
                        </div>
                        <div class="text-center">
                            <label class="block text-[10px] text-emerald-400 font-bold mb-1 uppercase">Time-Space / คน</label>
                            <input type="number" id="gB_p3" value="0" class="w-full p-2 border border-emerald-100 rounded-xl text-center text-sm font-bold bg-white">
                        </div>
                    </div>
                </div>
            </div>

            <button onclick="update()" class="w-full bg-slate-800 text-white py-4 rounded-2xl font-bold text-lg hover:bg-black transition-all shadow-lg active:scale-[0.98]">
                คำนวณ
            </button>
        </div>

        <div class="flex space-x-8 mb-6 border-b border-slate-200 text-sm overflow-x-auto pb-1">
            <button onclick="st(1)" id="t1" class="pb-2 px-4 transition-all tab-active whitespace-nowrap">Puppet Fragment</button>
            <button onclick="st(2)" id="t2" class="pb-2 px-4 transition-all text-slate-400 whitespace-nowrap">Feathers (Light-Dark & Time-Space)</button>
        </div>

        <div id="res" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4"></div>
    </div>

    <script>
        let tab = 1;
        function st(n) { tab = n; document.getElementById('t1').className = n===1?'pb-2 px-4 transition-all tab-active whitespace-nowrap':'pb-2 px-4 transition-all text-slate-400 whitespace-nowrap'; document.getElementById('t2').className = n===2?'pb-2 px-4 transition-all tab-active whitespace-nowrap':'pb-2 px-4 transition-all text-slate-400 whitespace-nowrap'; update(); }

        function update() {
            const container = document.getElementById('res'); container.innerHTML = '';
            const t = [parseInt(document.getElementById('total_1').value)||0, parseInt(document.getElementById('total_2').value)||0, parseInt(document.getElementById('total_3').value)||0];
            const gA = { c: parseInt(document.getElementById('gA_people').value)||0, p: [parseInt(document.getElementById('gA_p1').value)||0, parseInt(document.getElementById('gA_p2').value)||0, parseInt(document.getElementById('gA_p3').value)||0] };
            const gB = { c: parseInt(document.getElementById('gB_people').value)||0, p: [parseInt(document.getElementById('gB_p1').value)||0, parseInt(document.getElementById('gB_p2').value)||0, parseInt(document.getElementById('gB_p3').value)||0] };
            
            const names = ['Fragment', 'Light-Dark', 'Time-Space'];
            let all = [];
            const ids = tab === 1 ? [0] : [1, 2];

            ids.forEach(idx => {
                let cur = 1;
                // Group 1
                for(let p=1; p<=gA.c; p++) {
                    for(let q=0; q<gA.p[idx]; q++) if(cur <= t[idx]) { all.push({ n: names[idx], id: cur++, o: `G1: คนที่ ${p}`, c: `cp-${p%10}` }); }
                }
                // Group 2
                for(let p=1; p<=gB.c; p++) {
                    for(let q=0; q<gB.p[idx]; q++) if(cur <= t[idx]) { all.push({ n: names[idx], id: cur++, o: `G2: คนที่ ${p}`, c: `cp-${(p+5)%10}` }); }
                }
                // ของเหลือ
                while(cur <= t[idx]) { all.push({ n: names[idx], id: cur++, o: "ของเหลือ", c: "bg-white text-slate-300 border-dashed border-slate-200" }); }
            });

            if (all.length === 0) { container.innerHTML = '<div class="col-span-full text-center py-12 text-slate-400 italic">ไม่พบข้อมูลกรุณากดคำนวณ</div>'; return; }

            for (let i = 0; i < all.length; i += 4) {
                const items = all.slice(i, i + 4);
                let h = `<div class="bg-white border border-slate-200 rounded-2xl overflow-hidden shadow-sm flex flex-col h-full uppercase tracking-tighter">
                    <div class="bg-slate-800 text-[9px] text-white p-2.5 flex justify-between font-bold"><span>Page ${Math.floor(i/4)+1}</span><span>ลำดับที่ ${i+1}</span></div>
                    <div class="p-3 space-y-2 flex-grow">`;
                items.forEach((it, idx) => {
                    h += `<div class="p-2.5 border rounded-xl ${it.c} flex flex-col justify-center min-h-[58px] shadow-sm"><div class="flex justify-between text-[9px] font-bold opacity-70"><span>${it.n}</span><span>#${it.id}</span></div><div class="text-sm font-bold mt-0.5">${it.o}</div></div>`;
                });
                for(let j=0; j < 4-items.length; j++) h += `<div class="h-[58px] border border-dashed border-slate-100 rounded-xl"></div>`;
                container.innerHTML += h + `</div></div>`;
            }
        }
        update();
    </script>
</body>
</html>
